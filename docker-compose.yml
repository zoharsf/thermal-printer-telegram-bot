services:
  catprint-bot:
    build: .
    restart: always
    privileged: true
    network_mode: host
    volumes:
      - ./data:/data
      - /var/run/dbus:/var/run/dbus
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
